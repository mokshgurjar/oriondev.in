<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#ffffff10" stroke-width="1"/>
  <text x="50" y="68" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" text-anchor="middle" fill="white" filter="url(#glow)" letter-spacing="-1">O</text>
</svg>
